name: Build macOS app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  mac:
    name: Package Gideon for macOS
    runs-on: macos-15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install FFmpeg
        run: brew install ffmpeg

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint repository
        run: pnpm lint

      - name: Check production gate plans
        run: |
          pnpm production:check -- --dry-run
          pnpm production:promote:check -- --dry-run

      - name: Run unit and media tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build renderer and main process
        run: pnpm build

      - name: Package macOS app
        run: pnpm package:mac

      - name: Check macOS release artifacts
        run: pnpm release:mac:check

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Gideon-macOS
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap
            release/latest-mac.yml
            release/provenance.json
          if-no-files-found: error
