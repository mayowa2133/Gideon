services:
  avatar-sadtalker:
    build:
      context: ./docker/avatar-sadtalker
      args:
        SADTALKER_REV: cd4c0465ae0b54a6f85af57f5c65fec9fe23e7f8
    image: gideon-avatar-sadtalker:local
    user: "10001:10001"
    read_only: true
    network_mode: "none"
    volumes:
      - ${GIDEON_AVATAR_WORK_DIR:?set GIDEON_AVATAR_WORK_DIR}:/work
      - ${GIDEON_AVATAR_CATALOG_DIR:?set GIDEON_AVATAR_CATALOG_DIR}:/catalog:ro
      - ${GIDEON_SADTALKER_MODEL_DIR:?set GIDEON_SADTALKER_MODEL_DIR}:/opt/sadtalker/checkpoints:ro
    environment:
      GIDEON_AVATAR_MODEL_VERSION: ${GIDEON_AVATAR_MODEL_VERSION:?set GIDEON_AVATAR_MODEL_VERSION}
      GIDEON_AVATAR_MODEL_LICENSE: ${GIDEON_AVATAR_MODEL_LICENSE:?set GIDEON_AVATAR_MODEL_LICENSE}
      GIDEON_AVATAR_MODEL_COMMERCIAL_APPROVED: "true"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
